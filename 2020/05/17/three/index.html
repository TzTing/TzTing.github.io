            <span>五月 17, 2020</span>

        <div class="content markdown">
            <p>后端返回二进制流  前端处理流转换成excel文件<br>遇到的问题：</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line">layer.load();</span><br><span class="line">$.ajax(&#123;</span><br><span class="line">    url: url,</span><br><span class="line">    contentType: <span class="string">'application/x-www-form-urlencoded'</span>,</span><br><span class="line">    type: <span class="string">'POST'</span>,</span><br><span class="line">    responseType : <span class="string">"arraybuffer"</span>,</span><br><span class="line">    xhrFields: &#123; <span class="attr">responseType</span>: <span class="string">"arraybuffer"</span> &#125;,</span><br><span class="line">    xhr: <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">        <span class="keyword">var</span> xhr = <span class="keyword">new</span> XMLHttpRequest();</span><br><span class="line">        xhr.responseType = <span class="string">'arraybuffer'</span>;</span><br><span class="line">        <span class="keyword">return</span> xhr;</span><br><span class="line">    &#125;,</span><br><span class="line">    success: <span class="function"><span class="keyword">function</span> (<span class="params">result</span>) </span>&#123;</span><br><span class="line">        parent.layer.closeAll(<span class="string">"loading"</span>);</span><br><span class="line">        <span class="keyword">var</span> blob = <span class="keyword">new</span> Blob([result], &#123;<span class="attr">type</span>: <span class="string">"application/vnd.ms-excel"</span>&#125;),</span><br><span class="line">            Temp = <span class="built_in">document</span>.createElement(<span class="string">"a"</span>);</span><br><span class="line">        Temp.style.display = <span class="string">'none'</span>;</span><br><span class="line">        Temp.href = <span class="built_in">window</span>.URL.createObjectURL(blob);</span><br><span class="line">        Temp.download = <span class="string">'t.xls'</span>;</span><br><span class="line">        <span class="built_in">document</span>.body.appendChild(Temp);</span><br><span class="line">        <span class="comment">// 	elink.click();</span></span><br><span class="line">        Temp.click();</span><br><span class="line">        <span class="built_in">document</span>.body.removeChild(Temp);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;);</span><br></pre></td></tr></table></figure>

<p>因为用的layui框架   需要有等待框  等待完成文件完成在关闭</p>
<p>所以在完成请求前 设置返回的流转为blob类型</p>
<p>改为用原生的ajax请求</p>
<figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br></pre></td><td class="code"><pre><span class="line">layer.load();</span><br><span class="line"><span class="keyword">var</span> xhr = <span class="keyword">new</span> XMLHttpRequest();</span><br><span class="line">xhr.open(<span class="string">'GET'</span>, url, <span class="literal">true</span>);        <span class="comment">// 也可以使用POST方式，根据接口</span></span><br><span class="line">xhr.responseType = <span class="string">"blob"</span>;    <span class="comment">// 返回类型blob</span></span><br><span class="line"><span class="comment">// 定义请求完成的处理函数，请求前也可以增加加载框/禁用下载按钮逻辑</span></span><br><span class="line">xhr.onload = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line"><span class="comment">// 请求完成</span></span><br><span class="line"><span class="keyword">if</span> (<span class="keyword">this</span>.status === <span class="number">200</span>) &#123;</span><br><span class="line"><span class="comment">// 返回200</span></span><br><span class="line"><span class="keyword">var</span> blob = <span class="keyword">this</span>.response;</span><br><span class="line"><span class="keyword">var</span> reader = <span class="keyword">new</span> FileReader();</span><br><span class="line">reader.readAsDataURL(blob);    <span class="comment">// 转换为base64，可以直接放入a表情href</span></span><br><span class="line">reader.onload = <span class="function"><span class="keyword">function</span> (<span class="params">e</span>) </span>&#123;</span><br><span class="line"><span class="comment">// 转换完成，创建一个a标签用于下载</span></span><br><span class="line"><span class="keyword">var</span> a = <span class="built_in">document</span>.createElement(<span class="string">'a'</span>);</span><br><span class="line">a.download = <span class="string">'单件套打目录.xlsx'</span>;</span><br><span class="line">a.href = e.target.result;</span><br><span class="line">$(<span class="string">"body"</span>).append(a);    <span class="comment">// 修复firefox中无法触发click</span></span><br><span class="line">a.click();</span><br><span class="line">$(a).remove();</span><br><span class="line">layer.closeAll(<span class="string">"loading"</span>);</span><br><span class="line">&#125;</span><br><span class="line">&#125;</span><br><span class="line">layer.closeAll(<span class="string">"loading"</span>);</span><br><span class="line">&#125;;</span><br><span class="line">xhr.send();</span><br></pre></td></tr></table></figure>
